openapi: 3.0.3
info:
  title: STAC API Async Export Endpoint Extension
  version: 1.0.0-beta.1
  description: |
    OpenAPI description for the STAC API Async Export extension.

    This extension adds asynchronous bulk export capabilities through a dedicated
    export task API.

    ## STAC-Native Discovery

    Implementations MUST advertise export capabilities via hypermedia links in the root
    catalog (landing page) using standardized rel types:
    - rel="export-capabilities": Points to GET /export/capabilities
    - rel="export": Points to POST /export

    This enables clients to discover export features without hardcoding paths.

    Conformance classes:
    - https://api.stacspec.org/v1.0.0/core (required)
    - https://api.stacspec.org/v1.0.0-beta.1/async-export (required)
    - https://api.stacspec.org/v1.0.0-rc.2/multi-tenant-catalogs (required if implementing /catalogs/{catalogId}/export)
    - https://api.stacspec.org/v1.0.0-rc.2/multi-tenant-catalogs/search (required if implementing /catalogs/{catalogId}/export)

tags:
  - name: Capabilities
    description: Discover export features supported by the implementation.
  - name: Exports
    description: Create and monitor async export jobs.
  - name: Scoped Catalog Export (Optional)
    description: Optional catalog-scoped route for export initiation.

paths:
  /export/capabilities:
    get:
      tags:
        - Capabilities
      summary: Get export capabilities
      operationId: getExportCapabilities
      description: |
        Returns supported output formats and delivery methods.
        
        This endpoint is discovered via the rel="export-capabilities" link in the root catalog.
        Clients SHOULD query this endpoint before initiating an export to determine
        what formats and delivery methods are supported.
      responses:
        '200':
          description: Export capabilities
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExportCapabilities'

  /export:
    post:
      tags:
        - Exports
      summary: Initiate async export
      operationId: createExport
      description: |
        Submits an async export task.

        This endpoint is discovered via the rel="export" link in the root catalog.
        The request body accepts STAC Item Search parameters and an export
        configuration object. The server responds with 202 Accepted and a jobID
        for polling the task status.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExportRequest'
      responses:
        '202':
          description: Export task accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExportAccepted'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '501':
          description: Requested export configuration is not implemented
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /export/{jobID}:
    get:
      tags:
        - Exports
      summary: Get export status
      operationId: getExportStatus
      description: |
        Returns the current status of an export task.

        If redirect=true is provided and the export is completed with polling
        delivery, the server may respond with 303 redirecting to download_url.
      parameters:
        - $ref: '#/components/parameters/jobID'
        - name: redirect
          in: query
          required: false
          description: Request a 303 redirect to download_url when available.
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Export task status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExportStatus'
        '303':
          description: Redirect to file download URL when completed
        '404':
          description: Export task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /catalogs/{catalogId}/export:
    post:
      tags:
        - Scoped Catalog Export (Optional)
      summary: Initiate export from catalog-scoped route
      operationId: createCatalogExport
      description: |
        Optional route for implementations that support Multi-Tenant Catalogs.

        The export must be scoped to items reachable from the specified
        catalog hierarchy.
      parameters:
        - $ref: '#/components/parameters/catalogId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExportRequest'
      responses:
        '202':
          description: Export task accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExportAccepted'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '501':
          description: Route or configuration not implemented
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  parameters:
    jobID:
      name: jobID
      in: path
      required: true
      description: Unique export task identifier (OGC API - Processes aligned).
      schema:
        type: string

    catalogId:
      name: catalogId
      in: path
      required: true
      description: Catalog identifier used for search scoping.
      schema:
        type: string

  schemas:
    ExportCapabilities:
      type: object
      required:
        - supported_formats
        - supported_delivery_methods
      properties:
        supported_formats:
          type: array
          items:
            type: string
          example:
            - geoparquet
            - geojson
            - csv
        supported_delivery_methods:
          type: array
          items:
            type: string
            enum:
              - polling
              - webhook
              - s3
              - gcs
              - azure
          example:
            - polling
            - webhook
            - s3
        max_items_limit:
          type: integer
          minimum: 1
          example: 500000
        storage_retention_days:
          type: integer
          minimum: 0
          example: 7

    ExportRequest:
      allOf:
        - $ref: '#/components/schemas/StacSearchBody'
        - type: object
          required:
            - export
          properties:
            export:
              $ref: '#/components/schemas/ExportConfig'

    StacSearchBody:
      type: object
      description: |
        Subset of STAC Item Search request fields. Implementations may support
        additional fields.
      properties:
        collections:
          type: array
          items:
            type: string
        ids:
          type: array
          items:
            type: string
        bbox:
          type: array
          minItems: 4
          maxItems: 6
          items:
            type: number
        datetime:
          type: string
          description: RFC 3339 interval or single datetime.
        limit:
          type: integer
          minimum: 1
        intersects:
          type: object
          description: GeoJSON geometry for spatial filtering.
        query:
          type: object
          additionalProperties: true
        filter:
          oneOf:
            - type: object
              additionalProperties: true
            - type: string
      additionalProperties: true

    ExportConfig:
      type: object
      required:
        - format
      properties:
        format:
          type: string
          description: Desired output format.
          example: geoparquet
        delivery:
          $ref: '#/components/schemas/DeliveryConfig'

    DeliveryConfig:
      type: object
      properties:
        method:
          type: string
          enum:
            - polling
            - webhook
            - s3
            - gcs
            - azure
          default: polling
        webhook_url:
          type: string
          format: uri
          description: Required when method is webhook.
        webhook_secret:
          type: string
          description: Optional secret for HMAC-SHA256 webhook signature verification. If provided, server MUST sign webhook payloads with X-Hub-Signature-256 header.
        destination_uri:
          type: string
          format: uri
          description: Required when method is s3, gcs, or azure.

    ExportAccepted:
      type: object
      required:
        - jobID
        - status
        - type
      properties:
        jobID:
          type: string
          description: Unique export task identifier (OGC API - Processes aligned).
          example: exp-a1b2c3d4
        type:
          type: string
          enum:
            - process
          default: process
          description: Type of resource (OGC API - Processes conformance).
        status:
          type: string
          enum:
            - accepted
            - running
            - successful
            - failed
            - dismissed
          example: accepted
          description: Job status (OGC API - Processes aligned).
        message:
          type: string
          example: Export task has been queued.
        created:
          type: string
          format: date-time
          description: Timestamp when the job was created.
        started:
          type: string
          format: date-time
          description: Timestamp when the job started processing.
        finished:
          type: string
          format: date-time
          description: Timestamp when the job finished.
        updated:
          type: string
          format: date-time
          description: Timestamp of the last status update.
        progress:
          type: integer
          minimum: 0
          maximum: 100
          description: Progress percentage (0-100).

    ExportStatus:
      type: object
      required:
        - jobID
        - status
        - type
      properties:
        jobID:
          type: string
          description: Unique export task identifier (OGC API - Processes aligned).
          example: exp-a1b2c3d4
        type:
          type: string
          enum:
            - process
          default: process
          description: Type of resource (OGC API - Processes conformance).
        status:
          type: string
          enum:
            - accepted
            - running
            - successful
            - failed
            - dismissed
          description: Job status (OGC API - Processes aligned).
        message:
          type: string
          description: Human-readable status message.
        created:
          type: string
          format: date-time
          description: Timestamp when the job was created.
        started:
          type: string
          format: date-time
          description: Timestamp when the job started processing.
        finished:
          type: string
          format: date-time
          description: Timestamp when the job finished.
        updated:
          type: string
          format: date-time
          description: Timestamp of the last status update.
        progress:
          type: integer
          minimum: 0
          maximum: 100
          description: Progress percentage (0-100).
        download_url:
          type: string
          format: uri
          description: Present when delivery is polling and status is successful.
        destination_uri:
          type: string
          format: uri
          description: Present when file is pushed to cloud destination.
        expires_at:
          type: string
          format: date-time
          description: Expiration timestamp for download_url or temporary storage.
        estimated_items:
          type: integer
          minimum: 0
          description: Estimated number of items in the export.
        item_count:
          type: integer
          minimum: 0
          description: Actual number of items exported (present when status is successful).
        file_size_bytes:
          type: integer
          minimum: 0
          description: Size of the exported file in bytes.
        error:
          oneOf:
            - type: string
              description: Human-readable error message when status is failed.
            - type: object
              required:
                - code
                - description
              properties:
                code:
                  type: string
                  description: Error code (e.g., ItemLimitExceeded, InvalidCredentials)
                description:
                  type: string
                  description: Detailed error description
        truncated:
          type: boolean
          description: True if export was truncated due to max_items_limit. Only present if status is successful and truncation occurred.

    Error:
      type: object
      required:
        - code
        - description
      properties:
        code:
          type: string
          example: InvalidParameter
        description:
          type: string
          example: The requested export format is not supported.
