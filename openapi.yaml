openapi: 3.0.3
info:
  title: STAC API Async Export Endpoint Extension
  version: 1.0.0-beta.1
  description: |
    OpenAPI description for the STAC API Async Export extension.

    This extension adds asynchronous bulk export capabilities through a dedicated
    export task API.

    Conformance classes:
    - https://api.stacspec.org/v1.0.0/core (required)
    - https://api.stacspec.org/v1.0.0-beta.1/async-export (required)
    - https://api.stacspec.org/v1.0.0-rc.2/multi-tenant-catalogs (required if implementing /catalogs/{catalogId}/export)
    - https://api.stacspec.org/v1.0.0-rc.2/multi-tenant-catalogs/search (required if implementing /catalogs/{catalogId}/export)

tags:
  - name: Capabilities
    description: Discover export features supported by the implementation.
  - name: Exports
    description: Create and monitor async export jobs.
  - name: Scoped Catalog Export (Optional)
    description: Optional catalog-scoped route for export initiation.

paths:
  /export/capabilities:
    get:
      tags:
        - Capabilities
      summary: Get export capabilities
      operationId: getExportCapabilities
      description: Returns supported output formats and delivery methods.
      responses:
        '200':
          description: Export capabilities
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExportCapabilities'

  /export:
    post:
      tags:
        - Exports
      summary: Initiate async export
      operationId: createExport
      description: |
        Submits an async export task.

        The request body accepts STAC Item Search parameters and an export
        configuration object.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExportRequest'
      responses:
        '202':
          description: Export task accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExportAccepted'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '501':
          description: Requested export configuration is not implemented
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /export/{exportId}:
    get:
      tags:
        - Exports
      summary: Get export status
      operationId: getExportStatus
      description: |
        Returns the current status of an export task.

        If redirect=true is provided and the export is completed with polling
        delivery, the server may respond with 303 redirecting to download_url.
      parameters:
        - $ref: '#/components/parameters/exportId'
        - name: redirect
          in: query
          required: false
          description: Request a 303 redirect to download_url when available.
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Export task status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExportStatus'
        '303':
          description: Redirect to file download URL when completed
        '404':
          description: Export task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /catalogs/{catalogId}/export:
    post:
      tags:
        - Scoped Catalog Export (Optional)
      summary: Initiate export from catalog-scoped route
      operationId: createCatalogExport
      description: |
        Optional route for implementations that support Multi-Tenant Catalogs.

        The export must be scoped to items reachable from the specified
        catalog hierarchy.
      parameters:
        - $ref: '#/components/parameters/catalogId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExportRequest'
      responses:
        '202':
          description: Export task accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExportAccepted'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '501':
          description: Route or configuration not implemented
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  parameters:
    exportId:
      name: exportId
      in: path
      required: true
      description: Unique export task identifier.
      schema:
        type: string

    catalogId:
      name: catalogId
      in: path
      required: true
      description: Catalog identifier used for search scoping.
      schema:
        type: string

  schemas:
    ExportCapabilities:
      type: object
      required:
        - supported_formats
        - supported_delivery_methods
      properties:
        supported_formats:
          type: array
          items:
            type: string
          example:
            - geoparquet
            - geojson
            - csv
        supported_delivery_methods:
          type: array
          items:
            type: string
            enum:
              - polling
              - webhook
              - s3
              - gcs
              - azure
          example:
            - polling
            - webhook
            - s3
        max_items_limit:
          type: integer
          minimum: 1
          example: 500000
        storage_retention_days:
          type: integer
          minimum: 0
          example: 7

    ExportRequest:
      allOf:
        - $ref: '#/components/schemas/StacSearchBody'
        - type: object
          required:
            - export
          properties:
            export:
              $ref: '#/components/schemas/ExportConfig'

    StacSearchBody:
      type: object
      description: |
        Subset of STAC Item Search request fields. Implementations may support
        additional fields.
      properties:
        collections:
          type: array
          items:
            type: string
        ids:
          type: array
          items:
            type: string
        bbox:
          type: array
          minItems: 4
          maxItems: 6
          items:
            type: number
        datetime:
          type: string
          description: RFC 3339 interval or single datetime.
        limit:
          type: integer
          minimum: 1
        intersects:
          type: object
          description: GeoJSON geometry for spatial filtering.
        query:
          type: object
          additionalProperties: true
        filter:
          oneOf:
            - type: object
              additionalProperties: true
            - type: string
      additionalProperties: true

    ExportConfig:
      type: object
      required:
        - format
      properties:
        format:
          type: string
          description: Desired output format.
          example: geoparquet
        delivery:
          $ref: '#/components/schemas/DeliveryConfig'

    DeliveryConfig:
      type: object
      properties:
        method:
          type: string
          enum:
            - polling
            - webhook
            - s3
            - gcs
            - azure
          default: polling
        webhook_url:
          type: string
          format: uri
          description: Required when method is webhook.
        destination_uri:
          type: string
          format: uri
          description: Required when method is s3, gcs, or azure.

    ExportAccepted:
      type: object
      required:
        - export_id
        - status
        - status_url
      properties:
        export_id:
          type: string
          example: exp-a1b2c3d4
        status:
          type: string
          enum:
            - pending
            - processing
            - completed
            - failed
          example: pending
        status_url:
          type: string
          format: uri
          example: https://api.example.com/export/exp-a1b2c3d4
        message:
          type: string
          example: Export task has been queued.

    ExportStatus:
      type: object
      required:
        - export_id
        - status
        - status_url
      properties:
        export_id:
          type: string
          example: exp-a1b2c3d4
        status:
          type: string
          enum:
            - pending
            - processing
            - completed
            - failed
        status_url:
          type: string
          format: uri
        download_url:
          type: string
          format: uri
          description: Present when delivery is polling and status is completed.
        destination_uri:
          type: string
          format: uri
          description: Present when file is pushed to cloud destination.
        expires_at:
          type: string
          format: date-time
        estimated_items:
          type: integer
          minimum: 0
        progress_percentage:
          type: integer
          minimum: 0
          maximum: 100
        item_count:
          type: integer
          minimum: 0
        file_size_bytes:
          type: integer
          minimum: 0
        error:
          type: string

    Error:
      type: object
      required:
        - code
        - description
      properties:
        code:
          type: string
          example: InvalidParameter
        description:
          type: string
          example: The requested export format is not supported.
